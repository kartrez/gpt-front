<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <!-- Тайл музыкальных нот для фона страницы /music. Цвет — брендовый secondary (#75ac9d),
       прозрачностью управляет CSS на слое-подложке. -->
  <g fill="#75ac9d">
    <!-- Восьмая нота с флажком (слева сверху) -->
    <g transform="translate(40,40)">
      <ellipse cx="0" cy="62" rx="13" ry="9.5" transform="rotate(-20 0 62)"/>
      <rect x="11" y="2" width="3.6" height="60" rx="1.8"/>
      <path d="M14.6 2 c20 7 22 26 9 40 c10 -16 6 -33 -9 -44 z"/>
    </g>

    <!-- Пара восьмых под ребром (центр-справа) -->
    <g transform="translate(205,150)">
      <ellipse cx="0" cy="55" rx="12.5" ry="9" transform="rotate(-20 0 55)"/>
      <ellipse cx="58" cy="46" rx="12.5" ry="9" transform="rotate(-20 58 46)"/>
      <rect x="10.5" y="3" width="3.6" height="52" rx="1.8"/>
      <rect x="68.5" y="-6" width="3.6" height="52" rx="1.8"/>
      <path d="M10.5 3 L72 -6 L72 6 L10.5 15 Z"/>
    </g>

    <!-- Четвертная нота (снизу слева) -->
    <g transform="translate(95,235)">
      <ellipse cx="0" cy="40" rx="12.5" ry="9" transform="rotate(-20 0 40)"/>
      <rect x="10.5" y="-12" width="3.6" height="52" rx="1.8"/>
    </g>

    <!-- Маленькая восьмая (снизу справа) -->
    <g transform="translate(292,250)">
      <ellipse cx="0" cy="50" rx="10.5" ry="7.6" transform="rotate(-20 0 50)"/>
      <rect x="8.8" y="4" width="3" height="46" rx="1.5"/>
      <path d="M11.8 4 c16 6 18 21 7 32 c8 -13 5 -27 -7 -36 z"/>
    </g>
  </g>
</svg>
