<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <g fill="none" stroke="#75ac9d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- скруглённый квадрат -->
    <rect x="24" y="34" width="46" height="46" rx="10"/>
    <!-- круг -->
    <circle cx="128" cy="54" r="24"/>
    <!-- треугольник -->
    <polygon points="224,34 247,77 201,77"/>

    <!-- перо/нибы -->
    <polygon points="30,126 58,126 44,168"/>
    <path d="M44 138 L44 160"/>

    <!-- кривая Безье с узлами -->
    <path d="M106 158 C 120 130, 150 186, 164 158" stroke-width="2.5"/>

    <!-- шестиугольник -->
    <polygon points="250,126 271,138 271,162 250,174 229,162 229,138"/>

    <!-- мишень/концентрические круги -->
    <circle cx="248" cy="250" r="20"/>
    <circle cx="248" cy="250" r="8"/>

    <!-- вектор-узел (плюс) -->
    <path d="M130 250 H150 M140 240 V260"/>
  </g>

  <g fill="#75ac9d" stroke="none">
    <!-- узлы кривой Безье -->
    <circle cx="106" cy="158" r="3.5"/>
    <circle cx="164" cy="158" r="3.5"/>
    <!-- кончик пера -->
    <circle cx="44" cy="174" r="2.5"/>
    <!-- палитра-точки -->
    <circle cx="40" cy="250" r="6"/>
    <circle cx="56" cy="242" r="6"/>
    <circle cx="60" cy="262" r="6"/>
  </g>
</svg>
